version: '3.8'

services:
  web:
    build: .
    ports:
      - "80:80"
    depends_on:
      - db
    environment:
      - MYSQL_HOST=db
      - MYSQL_USER=kigali
      - MYSQL_PASSWORD=kigali123
      - MYSQL_DATABASE=kigali_fresh_market

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: kigali_fresh_market
      MYSQL_USER: kigali
      MYSQL_PASSWORD: kigali123
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: