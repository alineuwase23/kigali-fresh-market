name: Kigali Fresh Market CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: List project files
      run: |
        echo "📁 Project files:"
        ls -la

    - name: Check PHP syntax
      run: |
        sudo apt-get install -y php-cli
        php -l db.php
        php -l submit_order.php
        echo "✅ PHP syntax check passed!"

    - name: Success message
      run: echo "✅ CI/CD Pipeline completed successfully for Kigali Fresh Market!"
