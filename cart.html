<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - Kigali Fresh Market</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .cart-container {
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .cart-container h2 {
            color: #2e7d32;
            margin-bottom: 20px;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #eee;
        }
        .cart-item button {
            background-color: #e53935;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 15px;
            cursor: pointer;
        }
        .cart-total {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
            color: #2e7d32;
            text-align: right;
        }
        .checkout-btn {
            display: block;
            width: 100%;
            background-color: #2e7d32;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 25px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
        }
        .checkout-btn:hover {
            background-color: #1b5e20;
        }
    </style>
</head>
<body>

    <!-- NAVIGATION -->
    <nav>
        <div class="logo">🛒 Kigali Fresh Market</div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="products.html">Products</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="cart.html">Cart 🛒 <span id="cart-count">0</span></a></li>
        </ul>
    </nav>

    <!-- CART SECTION -->
    <div class="cart-container">
        <h2>🛒 Your Cart</h2>
        <div id="cart-items"></div>
        <div class="cart-total">
            Total: RWF <span id="cart-total">0</span>
        </div>
        <button class="checkout-btn" onclick="window.location.href='checkout.html'">
            Proceed to Checkout
        </button>
    </div>

    <footer>
        <p>&copy; 2026 Kigali Fresh Market. All rights reserved.</p>
    </footer>

    <script src="cart.js"></script>
</body>
</html>
